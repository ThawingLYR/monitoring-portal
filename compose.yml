services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: streamlit-app
    
    environment:
      - SERVER_ADDRESS=${SERVER_ADDRESS}

    depends_on:
      - cron-tasks

    volumes:
      - config:/streamlit-app/config
      - data:/streamlit-app/data

  cron-tasks:
    build:
      context: .
      dockerfile: Dockerfile
      target: cron-tasks

    environment:
    - tilsig_username=${tilsig_username}
    - tilsig_password=${tilsig_password}
    - frost_client_id=${frost_client_id}

    volumes:
      - config:/streamlit-app/config
      - data:/streamlit-app/data

volumes:
  config:
  data: 