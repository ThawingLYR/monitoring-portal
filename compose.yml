services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: streamlit-app
    
    environment:
      - SERVER_ADDRESS=${SERVER_ADDRESS}

    ports:
      - "8501:8501"

    volumes:
      - config:/streamlit-app/config:ro
      - data:/streamlit-app/data:ro
      - figure:/streamlit-app/figure:ro

  cron-tasks:
    build:
      context: .
      dockerfile: Dockerfile
      target: cron-tasks

    environment:
    - tilsig_username=${tilsig_username}
    - tilsig_password=${tilsig_password}
    - frost_client_id=${frost_client_id}

    volumes:
      - config:/streamlit-app/config
      - data:/streamlit-app/data

volumes:
  config:
  figure:
  data: 